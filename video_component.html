<!-- overlay/video_component.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viewer Overlay</title>
  <style>
/* Basic CSS for Video Component */
#overlay-container {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  background-color: Green;
}

#overlay {
  width: 100%;
  height: 66.67%; /* 3:2 aspect ratio */
  background-color: rgba(255, 255, 255, 0.8);
  padding: 20px;
  border-radius: 10px;
  font-size: 1.5rem;
  color: #555; 
  display: flex;
  justify-content: center;
  align-items: center;
}

  </style>
</head>
<body>
  <div id="overlay-container">
    <div id="overlay">
      <p>Welcome to the stream! The Wizard is ready for action.</p>
    </div>
  </div>
</body>
</html>
